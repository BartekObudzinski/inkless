<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inkless</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <div class="container">
      <header>
        <h1>Inkless</h1>
        <p class="subtitle">Driverless Printing for macOS</p>
      </header>

      <main>
        <div class="tabs">
          <button class="tab active" data-tab="print">Print</button>
          <button class="tab" data-tab="printers">Printers</button>
          <button class="tab" data-tab="discover">Discover</button>
        </div>

        <section id="print" class="tab-content active">
          <div class="card">
            <h2>Print Document</h2>

            <div class="form-group">
              <label>Printer</label>
              <div class="input-row">
                <select id="printer-select">
                  <option value="">Select printer...</option>
                </select>
                <button id="refresh-printers" class="btn-icon" title="Refresh">↻</button>
              </div>
            </div>

            <div class="form-group">
              <label>File</label>
              <div class="input-row">
                <input type="text" id="file-path" readonly placeholder="No file selected" />
                <button id="select-file" class="btn-secondary">Browse</button>
              </div>
            </div>

            <button id="print-btn" class="btn-primary" disabled>Print</button>

            <div id="print-status" class="status hidden"></div>
          </div>
        </section>

        <section id="printers" class="tab-content">
          <div class="card">
            <h2>Configured Printers</h2>
            <div id="printer-list" class="printer-list">
              <p class="empty-state">Loading...</p>
            </div>
          </div>
        </section>

        <section id="discover" class="tab-content">
          <div class="card">
            <h2>Add New Printer</h2>

            <div class="discover-section">
              <h3>Auto Discovery</h3>
              <p class="section-desc">Find printers on your network automatically</p>
              <button id="auto-discover-btn" class="btn-primary">Auto Discover</button>
              <div id="discovered-list" class="discovered-list"></div>
            </div>

            <div class="manual-section">
              <h3>Manual Setup</h3>
              <p class="section-desc">Or enter printer IP address manually</p>
              <div class="form-group">
                <label>Printer IP Address</label>
                <input type="text" id="printer-ip" placeholder="192.168.1.X" />
              </div>
              <button id="scan-btn" class="btn-secondary">Scan Ports</button>
            </div>

            <div id="scan-results" class="scan-results hidden">
              <h3>Scan Results</h3>
              <div id="port-list"></div>
            </div>

            <div id="add-printer-form" class="hidden">
              <div class="form-group">
                <label>Printer Name</label>
                <input type="text" id="new-printer-name" placeholder="CanonG3010" />
              </div>
              <button id="add-printer-btn" class="btn-primary">Add Printer</button>
            </div>

            <div id="discover-status" class="status hidden"></div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
